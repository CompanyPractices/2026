# =========================================================================
# .pre-commit-config.yaml — Pre-commit хуки для СМП
# =========================================================================
# Установка:
#   pip install pre-commit          # или brew install pre-commit
#   pre-commit install              # устанавливает git hooks
#
# Запуск вручную на всех файлах:
#   pre-commit run --all-files
#
# Пропустить проверку (если очень надо):
#   git commit --no-verify
# =========================================================================

repos:
# -------------------------------------------------------------------
# Общие проверки (все языки)
# -------------------------------------------------------------------
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
    name: "Trim trailing whitespace"
  - id: end-of-file-fixer
    name: "Fix end of files (newline)"
    exclude: \.csv$
  - id: check-yaml
    name: "Check YAML syntax"
    args: [ --allow-multiple ]
    exclude: ^starters/java/target/
  - id: check-json
    name: "Check JSON syntax"
  - id: check-merge-conflict
    name: "Check for merge conflicts"
  - id: detect-private-key
    name: "Detect private keys"
  - id: mixed-line-ending
    name: "Normalize line endings"
    args: [ --fix=auto ]

