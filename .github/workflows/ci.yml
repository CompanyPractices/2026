name: CI Pipeline

on:
  push:
    branches:
      - '**'
    paths:
      - 'services/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yaml'
      - '.env.example'
      - 'docs/api/**'
      - 'scripts/smoke-test.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yaml'
      - '.env.example'
      - 'docs/api/**'
      - 'scripts/smoke-test.sh'

jobs:
  base-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  build-common:
    runs-on: ubuntu-latest
    needs: base-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build common module
        run: mvn -f services/pom.xml -P common -pl common -am package

  java-services:
    runs-on: ubuntu-latest
    needs: [base-lint, build-common]

    strategy:
      matrix:
        service: [
          gateway,
          switch,
          authorization,
          card-management,
          terminal-simulator,
          merchant-acquirer,
          transaction-logger
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run java linter
        run: mvn -f services/pom.xml -P${{ matrix.service }} checkstyle:check

      - name: Build and run unit tests
        run: mvn -f services/pom.xml -P${{ matrix.service }} install -Dcheckstyle.skip=true

  frontend-dashboard:
    runs-on: ubuntu-latest
    needs: base-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./services/dashboard
        run: npm install

      - name: Run ESLint
        working-directory: ./services/dashboard
        run: npm run lint

      - name: Run frontend tests
        working-directory: ./services/dashboard
        run: npm test -- --run

      - name: Build frontend application
        working-directory: ./services/dashboard
        run: npm run build

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [java-services, frontend-dashboard]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize GHCR namespace to lowercase
        run: echo "GHCR_USER=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Create .env file
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Maven/npm build mounts
        uses: actions/cache@v4
        with:
          path: |
            var-cache-m2
            var-cache-npm
          key: docker-build-mounts-${{ hashFiles('services/**/pom.xml', 'services/dashboard/package.json') }}
          restore-keys: |
            docker-build-mounts-

      - name: Inject build mounts into Buildx
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          cache-map: |
            {
              "var-cache-m2": "/root/.m2",
              "var-cache-npm": "/root/.npm"
            }
          skip-extraction: false

      - name: Build Docker images
        run: docker compose build
        env:
          GHCR_USER: ${{ env.GHCR_USER }}

      - name: Start all services
        run: docker compose up -d
        env:
          GHCR_USER: ${{ env.GHCR_USER }}

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start"
          for i in {1..60}; do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              break
            fi
            echo "Waiting ($i/60)"
            sleep 5
          done
          sleep 15

      - name: Run smoke tests
        run: chmod +x scripts/smoke-test.sh && ./scripts/smoke-test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [java-services, frontend-dashboard]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize GHCR namespace to lowercase
        run: echo "GHCR_USER=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up JDK 21 for E2E
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Create .env file
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Maven/npm build mounts
        uses: actions/cache@v4
        with:
          path: |
            var-cache-m2
            var-cache-npm
          key: docker-build-mounts-${{ hashFiles('services/**/pom.xml', 'services/dashboard/package.json') }}
          restore-keys: |
            docker-build-mounts-

      - name: Inject build mounts into Buildx
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          cache-map: |
            {
              "var-cache-m2": "/root/.m2",
              "var-cache-npm": "/root/.npm"
            }
          skip-extraction: false

      - name: Build Docker images
        run: docker compose build
        env:
          GHCR_USER: ${{ env.GHCR_USER }}

      - name: Start all services
        run: docker compose up -d
        env:
          GHCR_USER: ${{ env.GHCR_USER }}

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start"
          for i in {1..60}; do
            not_ready=$(docker compose ps --format '{{.Health}}' | grep -E 'starting|unhealthy' | wc -l | tr -d ' ')
            if [ "$not_ready" == "0" ]; then
              break
            fi
            echo "Waiting ($i/60)"
            sleep 5
          done
          sleep 15

      - name: Run e2e tests
        run: mvn -f services/pom.xml -pl e2e-tests -am test -DskipE2eTests=false

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: [smoke-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize GHCR namespace to lowercase
        run: echo "GHCR_USER=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Create .env file
        run: cp .env.example .env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        run: |
          docker compose build
          docker compose push
        env:
          GHCR_USER: ${{ env.GHCR_USER }}

      - name: Copy config files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yaml,infra/**,scripts/**,.env.example"
          target: "~/app/2026/"

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            cd ~/app/2026
            cp -f .env.example .env
            echo "GHCR_USER=${GHCR_USER}" >> .env
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            docker compose down --remove-orphans
            docker compose pull
            chmod -R o+rx ./infra/grafana
            docker compose up -d --no-build
        env:
          GHCR_USER: ${{ env.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
