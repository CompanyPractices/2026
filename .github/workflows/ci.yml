name: CI Pipeline

on:
  push:
    branches:
      - '**'
    paths:
      - 'services/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - '.env.example'
      - 'docs/api/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - '.env.example'
      - 'docs/api/**'

jobs:
  base-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  build-common:
    runs-on: ubuntu-latest
    needs: base-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build common module
        run: mvn -P common -pl services/common -am package

  java-services:
    runs-on: ubuntu-latest
    needs: [base-lint, build-common]

    strategy:
      matrix:
        service: [
          gateway,
          switch,
          authorization,
          card-management,
          terminal-simulator,
          merchant-acquirer,
          transaction-logger
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run java linter
        working-directory: ./services/${{ matrix.service }}
        run: mvn checkstyle:check

      - name: Build and run unit tests
        run: mvn -P${{ matrix.service }} -pl services/${{ matrix.service }} -am package

      - name: Build docker image
        if: matrix.service != 'common'
        run: docker build -f services/${{ matrix.service }}/Dockerfile -t ${{ matrix.service }}:latest .

  frontend-dashboard:
    runs-on: ubuntu-latest
    needs: base-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./services/dashboard
        run: npm ci

      - name: Run ESLint
        working-directory: ./services/dashboard
        run: npm run lint

      - name: Run frontend tests
        working-directory: ./services/dashboard
        run: npm test -- --watchAll=false

      - name: Build frontend application
        working-directory: ./services/dashboard
        run: npm run build

      - name: Build frontend docker image
        run: |
          docker build -f services/dashboard/Dockerfile -t dashboard:latest ./services/dashboard