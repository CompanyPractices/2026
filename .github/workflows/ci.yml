name: CI Pipeline

on:
  push:
    branches:
      - '**'
    paths:
      - 'services/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yaml'
      - '.env.example'
      - 'docs/api/**'
      - 'scripts/smoke-test.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yaml'
      - '.env.example'
      - 'docs/api/**'
      - 'scripts/smoke-test.sh'

jobs:
  base-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  build-common:
    runs-on: ubuntu-latest
    needs: base-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build common module
        run: mvn -f services/pom.xml -P common -pl common -am package

  java-services:
    runs-on: ubuntu-latest
    needs: [base-lint, build-common]

    strategy:
      matrix:
        service: [
          gateway,
          switch,
          authorization,
          card-management,
          terminal-simulator,
          merchant-acquirer,
          transaction-logger
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run java linter
        run: mvn -f services/pom.xml -P${{ matrix.service }} checkstyle:check

      - name: Build and run unit tests
        run: mvn -f services/pom.xml -P${{ matrix.service }} install -Dcheckstyle.skip=true

  frontend-dashboard:
    runs-on: ubuntu-latest
    needs: base-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./services/dashboard
        run: npm install

      - name: Run ESLint
        working-directory: ./services/dashboard
        run: npm run lint

      - name: Run frontend tests
        working-directory: ./services/dashboard
        run: npm test -- --run

      - name: Build frontend application
        working-directory: ./services/dashboard
        run: npm run build

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [java-services, frontend-dashboard]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Create .env file
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Start all services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start"
          for i in {1..60}; do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              break
            fi
            echo "Waiting ($i/60)"
            sleep 5
          done
          sleep 15

      - name: Run smoke tests
        run: chmod +x scripts/smoke-test.sh && ./scripts/smoke-test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v
