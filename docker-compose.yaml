services:
  postgres:
    image: postgres:16-alpine
    container_name: smp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - smp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:alpine
#    build: ./services/gateway
    container_name: smp-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:8080"
    command: >
      sh -c "echo 'server { listen 8080; location / { return 200 \"{\\\"status\\\":\\\"OK\\\",\\\"service\\\":\\\"gateway\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    environment:
      - SERVER_PORT=8080
      - SWITCH_URL=http://switch:8080
      - CARD_MGMT_URL=http://card-management:8080
      - LOGGER_URL=http://transaction-logger:8080
      - TERMINAL_SIM_URL=http://terminal-simulator:8080
      - MERCHANT_SIM_URL=http://merchant-acquirer:8080
    depends_on:
      - switch
      - card-management
      - transaction-logger
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  card-management:
    image: nginx:alpine
#    build: ./services/card-management
    container_name: smp-card-management
    restart: unless-stopped
    ports:
      - "${CARD_MGMT_PORT}:8080"
    command: >
      sh -c "echo 'server { listen 8080; location / { return 200 \"{\\\"status\\\":\\\"OK\\\",\\\"service\\\":\\\"card-management\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    environment:
      - SERVER_PORT=8080
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  switch:
    image: nginx:alpine
#    build: ./services/switch
    container_name: smp-switch
    restart: unless-stopped
    ports:
      - "${SWITCH_PORT}:8080"
    command: >
      sh -c "echo 'server { listen 8080; location / { return 200 \"{\\\"status\\\":\\\"OK\\\",\\\"service\\\":\\\"switch\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    environment:
      - SERVER_PORT=8080
      - AUTH_URL=http://authorization:8080
      - LOGGER_URL=http://transaction-logger:8080
    depends_on:
      - authorization
      - transaction-logger
    networks:
      - smp-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  authorization:
    image: nginx:alpine
#    build: ./services/authorization
    container_name: smp-authorization
    restart: unless-stopped
    ports:
      - "${AUTH_PORT}:8080"
    command: >
      sh -c "echo 'server { listen 8080; location / { return 200 \"{\\\"status\\\":\\\"OK\\\",\\\"service\\\":\\\"authorization\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    environment:
      - SERVER_PORT=8080
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CARD_MGMT_URL=http://card-management:8080
    depends_on:
      postgres:
        condition: service_healthy
      card-management:
        condition: service_started
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  terminal-simulator:
#    build: ./services/terminal-simulator
    image: nginx:alpine
    container_name: smp-terminal-simulator
    restart: unless-stopped
    ports:
      - "${TERMINAL_PORT}:8080"
    command: >
      sh -c "echo 'server { listen 8080; location / { return 200 \"{\\\"status\\\":\\\"OK\\\",\\\"service\\\":\\\"terminal-simulator\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    environment:
      - SERVER_PORT=8080
      - GATEWAY_URL=http://gateway:8080
      - CARD_MGMT_URL=http://card-management:8080
    depends_on:
      - gateway
      - card-management
    networks:
      - smp-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  merchant-acquirer:
    image: nginx:alpine
#    build: ./services/merchant-acquirer
    container_name: smp-merchant-acquirer
    restart: unless-stopped
    ports:
      - "${MERCHANT_PORT}:8080"
    command: >
      sh -c "echo 'server { listen 8080; location / { return 200 \"{\\\"status\\\":\\\"OK\\\",\\\"service\\\":\\\"merchant-acquirer\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    environment:
      - SERVER_PORT=8080
      - GATEWAY_URL=http://gateway:8080
    depends_on:
      - gateway
    networks:
      - smp-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  transaction-logger:
    build: ./services/transaction-logger
    container_name: smp-transaction-logger
    restart: unless-stopped
    ports:
      - "${LOGGER_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  dashboard:
    image: nginx:alpine
#    build: ./services/dashboard
    container_name: smp-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT}:3000"
    command: >
      sh -c "echo 'server { listen 3000; location / { return 200 \"{\\\"status\\\":\\\"OK\\\",\\\"service\\\":\\\"dashboard\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    environment:
      - PORT=3000
      - GATEWAY_URL=http://gateway:8080
      - LOGGER_URL=http://transaction-logger:8080
      - LOGGER_WS_URL=ws://transaction-logger:8080
    depends_on:
      - gateway
      - transaction-logger
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  smp-network:
    driver: bridge

volumes:
  pg_data:
