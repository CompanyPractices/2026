services:
  postgres:
    image: postgres:16-alpine
    container_name: smp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - smp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: smp-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - SWITCH_URL=http://switch:8080
      - AUTH_URL=http://authorization:8080
      - CARD_MGMT_URL=http://card-management:8080
      - LOGGER_URL=http://transaction-logger:8080
      - TERMINAL_SIM_URL=http://terminal-simulator:8080
      - MERCHANT_SIM_URL=http://merchant-acquirer:8080
    depends_on:
      - switch
      - card-management
      - transaction-logger
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  card-management:
    build:
      context: .
      dockerfile: services/card-management/Dockerfile
    container_name: smp-card-management
    restart: unless-stopped
    ports:
      - "${CARD_MGMT_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_PORT=${DB_PORT}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  switch:
    build:
      context: .
      dockerfile: services/switch/Dockerfile
    container_name: smp-switch
    restart: unless-stopped
    ports:
      - "${SWITCH_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - AUTH_URL=http://authorization:8080
      - LOGGER_URL=http://transaction-logger:8080
    depends_on:
      - authorization
      - transaction-logger
    networks:
      - smp-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  authorization:
    build:
      context: .
      dockerfile: services/authorization/Dockerfile
    container_name: smp-authorization
    restart: unless-stopped
    ports:
      - "${AUTH_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_PORT=${DB_PORT}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - CARD_MGMT_URL=http://card-management:8080
    depends_on:
      postgres:
        condition: service_healthy
      card-management:
        condition: service_started
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  terminal-simulator:
    build:
      context: .
      dockerfile: services/terminal-simulator/Dockerfile
    container_name: smp-terminal-simulator
    restart: unless-stopped
    ports:
      - "${TERMINAL_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - GATEWAY_URL=http://gateway:8080
      - CARD_MGMT_URL=http://card-management:8080
    depends_on:
      - gateway
      - card-management
    networks:
      - smp-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  merchant-acquirer:
    build:
      context: .
      dockerfile: services/merchant-acquirer/Dockerfile
    container_name: smp-merchant-acquirer
    restart: unless-stopped
    ports:
      - "${MERCHANT_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - GATEWAY_URL=http://gateway:8080
    depends_on:
      - gateway
    networks:
      - smp-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  transaction-logger:
    build:
      context: .
      dockerfile: services/transaction-logger/Dockerfile
    container_name: smp-transaction-logger
    restart: unless-stopped
    ports:
      - "${LOGGER_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_PORT=${DB_PORT}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: smp-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT}:3000"
    environment:
      - PORT=3000
      - GATEWAY_URL=http://gateway:8080
      - LOGGER_URL=http://transaction-logger:8080
      - LOGGER_WS_URL=ws://transaction-logger:8080
    depends_on:
      - gateway
      - transaction-logger
    networks:
      - smp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  smp-network:
    driver: bridge

volumes:
  pg_data:
