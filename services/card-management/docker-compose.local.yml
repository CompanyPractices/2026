services:
  postgres:
    image: postgres:latest
    container_name: cm-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - cm-pg-data:/var/lib/postgresql
    ports:
      - "${DB_PORT:-5432}:5432"

volumes:
  cm-pg-data:
