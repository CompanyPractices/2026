spring.application.name: merchant-acquirer
server.port: ${PORT:8080}

# PostgreSQL (раскомментируй, если нужна БД)
spring.datasource.url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgre}
spring.datasource.username: ${DB_USER:user}
spring.datasource.password: ${DB_PASSWORD:pass}
spring.jpa.hibernate.ddl-auto: update
---
# Logging
logging.level.com.processing: INFO
logging.pattern.console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
---
# Actuator
management.endpoints.web.exposure.include: health,info
management.endpoint.health.show-details: always
spring.application.name: merchant-acquirer
