spring.application.name: merchant-acquirer
server.port: ${PORT:8080}

# PostgreSQL
spring.datasource.url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:smp_db}
spring.datasource.username: ${POSTGRES_USER:smp_user}
spring.datasource.password: ${POSTGRES_PASSWORD:smp_password}
spring.jpa.hibernate.ddl-auto: update

spring.flyway.clean-disabled: false
spring.flyway.clean-on-validation-error: true
spring.flyway.baseline-on-migrate: true

# Logging
logging.level.com.processing: INFO
logging.pattern.console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
spring.jpa.show-sql: true
spring.jpa.properties.hibernate.format_sql: true
logging.level.org.hibernate.orm.jdbc.bind: trace

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: merchant-acquirer
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]":
          - 0.5
          - 0.95
          - 0.99
management.endpoints.web.exposure.include: health,info
management.endpoint.health.show-details: always

# Scenarios
simulation.scenarios.grocery:
  mcc: ["5411", "5499"]
  count-lower: 100
  count-upper: 3000
  time-lower: "08:00"
  time-upper: "22:00"
  avg-approved: 95
