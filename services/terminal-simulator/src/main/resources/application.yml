server:
  port: ${PORT:8080}

gateway:
  url: ${GATEWAY_URL:http://localhost:8080}
  card-management-url: ${CARD_MGMT_URL:http://localhost:8080}

spring:
  threads:
    virtual:
      enabled: true

simulator:
  tps: 100
  cardsAmount: 10000

# PostgreSQL (раскомментируй, если нужна БД)
# spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:processing}
# spring.datasource.username=${DB_USER:postgres}
# spring.datasource.password=${DB_PASSWORD:postgres}
# spring.jpa.hibernate.ddl-auto=update
---
# Logging
logging:
  level:
    com.processing: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
---
# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: terminal-simulator
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]":
          - 0.5
          - 0.95
          - 0.99
