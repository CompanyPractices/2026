server:
  port: ${GATEWAY_PORT:8080}

#---
# Logging
logging:
  level:
    com.processing.gateway: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.server.mvc: TRACE
    org.springframework.http.client: TRACE
    org.springframework.web.client: DEBUG
#  pattern:
#    console: %d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

#---
# Actuator
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
    health:
      show-details: always

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: switch
            uri: http://switch:${SWITCH_PORT:8082}
            predicates:
              - Path=/api/transactions
            filters:
              - RewritePath=/api/transactions, /api/internal/route
          - id: logger
            uri: http://logger:${LOGGER_PORT:8088}
            predicates:
              - Path=/api/transactions/search
          - id: dashboard
            uri: http://logger:${LOGGER_PORT:8088}
            predicates:
              - Path=/api/dashboard/**
          - id: terminal
            uri: http://terminal-simulator:${TERMINAL_PORT:http:8085}
            predicates:
              - Path=/api/simulator/terminal/**
          - id: merchant
            uri: http://merchant-acquirer:${MERCHANT_PORT:8086}
            predicates:
              - Path=/api/simulator/merchant/**
          - id: cards
            uri: http://card-management:${CARD_MGMT_PORT:8081}
            predicates:
              - Path=/api/cards/**
  mvc:
    log-request-details: true
  endpoint:
    health:
      show-details: always

# Gateway
gateway:
  downstream-services:
    urls:
      switch-url: http://switch:${SWITCH_PORT:8082}
      logger-url: http://logger:${LOGGER_PORT:8088}
      auth-url: http://authorization:${AUTH_PORT:8083}
      cards-url: http://card-management:${CARD_MGMT_PORT:8081}
