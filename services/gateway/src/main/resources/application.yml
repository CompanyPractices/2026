server:
  port: ${PORT:8080}

# PostgreSQL (раскомментируй, если нужна БД)
# spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:processing}
# spring.datasource.username=${DB_USER:postgres}
# spring.datasource.password=${DB_PASSWORD:postgres}
# spring.jpa.hibernate.ddl-auto=update
---
# Logging
logging.level.com.processing=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
---
# Actuator
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
    health:
      show-details: always

#management.endpoints.web.exposure.include=health,info
#management.endpoint.health.show-details=always

spring:
  cloud:
    gateway:
      routes:
        - id: switch
          uri: ${SWITCH}
          predicates:
            - Path=/api/transactions
        - id: logger
          uri: ${LOGGER}
          predicates:
            - Path=/api/transactions/search
            - Path=/api/dashboard/**
        - id: terminal-simulator
          uri: ${TERMINAL}
          predicates:
            - Path=/api/simulator/terminal/**
        - id: merchant-simulator
          uri: ${MERCHANT}
          predicates:
            - Path=/api/simulator/merchant/**
        - id: cards
          uri: ${CARDS}
          predicates:
            - Path=/api/cards/**
