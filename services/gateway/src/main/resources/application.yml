server:
  port: ${PORT:8080}

#---
# Logging
logging:
  level:
    com.processing.gateway: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.server.mvc: TRACE
    org.springframework.http.client: TRACE
    org.springframework.web.client: DEBUG
#  pattern:
#    console: %d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

#---
# Actuator
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
    health:
      show-details: always

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: switch
            uri: ${SWITCH:http://localhost:8081}
            predicates:
              - Path=/api/transactions
            filters:
              - RewritePath=/api/transactions, /api/internal/route
          - id: logger
            uri: ${LOGGER:http://localhost:8082}
            predicates:
              - Path=/api/dashboard/**, /api/transactions/search
          - id: terminal-simulator
            uri: ${TERMINAL:http://localhost:8083}
            predicates:
              - Path=/api/simulator/terminal/**
          - id: merchant-simulator
            uri: ${MERCHANT:http://localhost:8084}
            predicates:
              - Path=/api/simulator/merchant/**
          - id: cards
            uri: ${CARDS:http://localhost:8085}
            predicates:
              - Path=/api/cards/**
  mvc:
    log-request-details: true
