server {
    # И IPv4, и IPv6: healthcheck'и (wget http://localhost:3000/health)
    # в alpine резолвят localhost в ::1 — без [::] они получают connection refused.
    listen 3000;
    listen [::]:3000;
    server_name localhost;

    # Резолвим upstream'ы через встроенный DNS Docker в момент запроса,
    # а не на старте nginx: иначе контейнер падает с "host not found in
    # upstream", если gateway/transaction-logger ещё не поднялись.
    resolver 127.0.0.11 valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        default_type application/json;
        return 200 '{"status":"UP","service":"dashboard","version":"1.0.0"}';
    }

    # API proxying (change to your Gateway address)
    location /api/ {
        set $gateway_upstream http://gateway:8080;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        set $logger_upstream http://transaction-logger:8080;
        proxy_pass $logger_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
