server:
  port: ${PORT:8082}

# AUTH_URL, LOGGER_URL — имена переменных из docker-compose (сервис switch);
switch:
  version: 1.0.0
  authorization-url: ${AUTH_URL:http://localhost:8083}
  logger-url: ${LOGGER_URL:http://localhost:8088}
  authorization-stub-enabled: true
  bin-routing:
    "400000": ISS001
    "400001": ISS002
    "400002": ISS003
    "400003": ISS004
    "400004": ISS005

# PostgreSQL (раскомментируй, если нужна БД)
# spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:processing}
# spring.datasource.username=${DB_USER:postgres}
# spring.datasource.password=${DB_PASSWORD:postgres}
# spring.jpa.hibernate.ddl-auto=update

logging:
  level:
    com.processing: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: switch
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]":
          - 0.5
          - 0.95
          - 0.99
