server:
  port: ${PORT:8082}

# AUTH_URL, LOGGER_URL — имена переменных из docker-compose (сервис switch);
switch:
  version: 1.0.0
  authorization-url: ${AUTH_URL:http://localhost:8083}
  logger-url: ${LOGGER_URL:http://localhost:8088}
  merchant-acquirer-url: ${MERCHANT_URL:http://localhost:8086}
  http:
    connect-timeout-ms: 3000
    auth-read-timeout-ms: 5000
    logger-read-timeout-ms: 2000
  retry:
    max-attempts: 3
    backoff-ms:
      - 1000
      - 2000
      - 4000
  bin-routing:
    "400000": ISS001
    "400001": ISS002
    "400002": ISS003
    "400003": ISS004
    "400004": ISS005

logging:
  level:
    com.processing: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
