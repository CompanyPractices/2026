server:
  port: ${KMS_PORT:8099}

---
# Logging
logging:
  level:
    com.processing.kms: WARN
    sql: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} %X{requestId} - %msg%n"

---
# Actuator
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
  endpoint:
    health:
      show-details: always

# PostgreSQL
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:smp_db}
    username: ${POSTGRES_USER:smp_user}
    password: ${POSTGRES_PASSWORD:smp_password}
  jpa:
    properties:
      jakarta:
        persistence:
          lock:
            timeout: 5000
  flyway:
    baseline-on-migrate: true
    locations: com/processing/kms/infrastructure/persistence/migrations
    ignore-migration-patterns: "*:missing"
    table: api_key_schema_history

kms:
  ttl-min: 1440
  generation:
    algorithm: AES
    length: 256
  clients:
    - type: "terminal-simulator"
      role: WRITE
    - type: "merchant-simulator"
      role: WRITE
    - type: "web-dashboard"
      role: READ
